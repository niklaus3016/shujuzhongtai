name: Build Android APK

on:
  push:
    branches:
      - main
  pull_request:
    branches:
      - main
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: 'npm'

      - name: Setup Java
        uses: actions/setup-java@v4
        with:
          distribution: 'temurin'
          java-version: '21'

      - name: Setup Android SDK
        uses: android-actions/setup-android@v3

      - name: Install dependencies
        run: npm ci

      - name: Build web app
        run: npm run build

      - name: Add Android platform
        run: npx cap add android

      - name: Sync Capacitor
        run: npx cap sync android

      - name: Copy icon file to Android resources
        working-directory: android
        run: |
          echo "Checking if icon file exists..."
          if [ -f "../gnzhzt-icon.png" ]; then
            echo "Icon file found"
            echo "Icon file size: $(du -h ../gnzhzt-icon.png)"
            mkdir -p app/src/main/res/mipmap-hdpi app/src/main/res/mipmap-mdpi app/src/main/res/mipmap-xhdpi app/src/main/res/mipmap-xxhdpi app/src/main/res/mipmap-xxxhdpi
            echo "Copying icon to mipmap directories..."
            cp ../gnzhzt-icon.png app/src/main/res/mipmap-hdpi/ic_launcher.png
            cp ../gnzhzt-icon.png app/src/main/res/mipmap-mdpi/ic_launcher.png
            cp ../gnzhzt-icon.png app/src/main/res/mipmap-xhdpi/ic_launcher.png
            cp ../gnzhzt-icon.png app/src/main/res/mipmap-xxhdpi/ic_launcher.png
            cp ../gnzhzt-icon.png app/src/main/res/mipmap-xxxhdpi/ic_launcher.png
            echo "Icon files copied successfully"
          else
            echo "Warning: Icon file not found, using default icon"
          fi

      - name: Build APK
        working-directory: android
        run: |
          chmod +x gradlew
          echo "Building Debug APK..."
          ./gradlew assembleDebug
          echo "Building Release APK (unsigned)..."
          ./gradlew assembleRelease
          echo "Verifying APK files..."
          ls -la app/build/outputs/apk/
          ls -la app/build/outputs/apk/debug/
          ls -la app/build/outputs/apk/release/
          echo "Debug APK size: $(du -h app/build/outputs/apk/debug/app-debug.apk)"
          echo "Release APK size: $(du -h app/build/outputs/apk/release/app-release-unsigned.apk)"

      - name: Verify APK integrity
        working-directory: android
        run: |
          echo "Checking if APK files exist..."
          if [ -f "app/build/outputs/apk/debug/app-debug.apk" ]; then
            echo "Debug APK exists"
          else
            echo "Error: Debug APK not found"
            exit 1
          fi
          if [ -f "app/build/outputs/apk/release/app-release-unsigned.apk" ]; then
            echo "Release APK exists"
          else
            echo "Error: Release APK not found"
            exit 1
          fi

      - name: Upload Debug APK
        uses: actions/upload-artifact@v4
        with:
          name: app-debug
          path: android/app/build/outputs/apk/debug/app-debug.apk
          retention-days: 30

      - name: Upload Release APK
        uses: actions/upload-artifact@v4
        with:
          name: app-release
          path: android/app/build/outputs/apk/release/app-release-unsigned.apk
          retention-days: 30

      - name: Create Release
        if: github.event_name == 'push' && github.ref == 'refs/heads/main'
        uses: softprops/action-gh-release@v1
        with:
          tag_name: v${{ github.run_number }}
          name: Release v${{ github.run_number }}
          files: |
            android/app/build/outputs/apk/debug/app-debug.apk
            android/app/build/outputs/apk/release/app-release-unsigned.apk
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
